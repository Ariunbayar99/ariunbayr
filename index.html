<!DOCTYPE html>
<html>

<meta charset="UTF-8">
<title>Taah</title>

<body>
    <a href="lab7.html"> shoo</a>

<button onclick="random()">Санамсаргүй тоо</button>

<h2 id="result"></h2>

<input type="text" id="check">

<button onclick="shalga()">Шалгах</button>

<script>

let num = 0;

function random(){

    num = Math.floor(Math.random() * (20000 - 10000 + 1)) + 10000;

    document.getElementById("result").innerHTML = num;

    setTimeout(function(){
        document.getElementById("result").innerHTML = "";
    },200);

}

function shalga(){

    let utga = Number(document.getElementById("check").value);

    if(utga == num){
        alert("Зөв байна");
    }else{
        alert("Буруу тоо байна " + num);
    }

    document.getElementById("check").value="";

}

</script>

</body>
</html>
